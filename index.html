<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Storybook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Comic Neue', cursive; }
        .book-text { font-family: 'Lora', serif; }
        .book-spine {
            background: linear-gradient(90deg, #5d4037 0%, #8d6e63 40%, #5d4037 100%);
        }
        .page-shadow {
            box-shadow: inset 20px 0 50px rgba(0,0,0,0.1);
        }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fade-in 0.5s ease-out forwards; }
        
        .loading-spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid #ffffff;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Custom Scrollbar for text area */
        .custom-scroll::-webkit-scrollbar { width: 8px; }
        .custom-scroll::-webkit-scrollbar-track { background: #fdf6e3; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #d4c4a8; border-radius: 4px; }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-900 via-purple-800 to-pink-700 min-h-screen text-gray-800">

    <div id="root"></div>

    <script type="module">
        import React, { useState, useEffect, useRef } from 'https://esm.sh/react@18';
        import ReactDOM from 'https://esm.sh/react-dom@18/client';
        import htm from 'https://esm.sh/htm';
        import { GoogleGenAI } from "https://esm.sh/@google/genai@0.12.0";

        const html = htm.bind(React.createElement);

        // --- Configuration ---
        
        // CHANGED: Switched to 1.5-flash to avoid 429 Quota errors on the free tier
        // It is faster and more reliable for this use case.
        const MODEL_STORY = "gemini-1.5-flash"; 
        const MODEL_IMAGE = "gemini-2.5-flash-image"; // Keep image model
        const MODEL_TTS = "gemini-2.5-flash-preview-tts"; // Keep TTS model

        // --- Utils ---

        const decodeAudioData = (base64String, sampleRate = 24000) => {
            const binaryString = atob(base64String);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            const int16Data = new Int16Array(bytes.buffer);
            const float32Data = new Float32Array(int16Data.length);
            for (let i = 0; i < int16Data.length; i++) {
                float32Data[i] = int16Data[i] / 32768.0; 
            }
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate });
            const buffer = audioCtx.createBuffer(1, float32Data.length, sampleRate);
            buffer.getChannelData(0).set(float32Data);
            return { buffer, ctx: audioCtx };
        };

        const cleanJson = (text) => {
            let clean = text.trim();
            if (clean.startsWith('```json')) clean = clean.replace(/^```json/, '');
            if (clean.startsWith('```')) clean = clean.replace(/^```/, '');
            if (clean.endsWith('```')) clean = clean.replace(/```$/, '');
            return clean.trim();
        };

        // --- Components ---

        function LoadingOverlay({ message }) {
            return html`
                <div class="fixed inset-0 bg-black bg-opacity-70 z-50 flex flex-col items-center justify-center text-white">
                    <div class="loading-spinner mb-4"></div>
                    <p class="text-xl font-bold animate-pulse">${message}</p>
                </div>
            `;
        }

        function AuthScreen({ onAuth }) {
            const checkKey = async () => {
                const hasKey = window.aistudio && window.aistudio.hasSelectedApiKey && await window.aistudio.hasSelectedApiKey();
                if (hasKey || process.env.API_KEY || window.MANUAL_API_KEY) {
                    onAuth();
                } else {
                    alert("Please select a billing-enabled API key to continue.");
                }
            };

            const handleSelectKey = async () => {
                if (window.aistudio && window.aistudio.openSelectKey) {
                    await window.aistudio.openSelectKey();
                    checkKey();
                } else {
                    const manualKey = prompt("Enter your Gemini API Key manually (dev mode):");
                    if(manualKey) {
                        window.MANUAL_API_KEY = manualKey;
                        onAuth();
                    }
                }
            };

            return html`
                <div class="flex flex-col items-center justify-center min-h-screen text-center p-6">
                    <div class="bg-white/10 backdrop-blur-md p-10 rounded-2xl shadow-2xl border border-white/20 max-w-lg w-full">
                        <h1 class="text-5xl font-bold text-yellow-300 mb-2 drop-shadow-md">Magic Storybook</h1>
                        <p class="text-white text-lg mb-8">Where AI writes and illustrates your dreams.</p>
                        <div class="bg-indigo-900/50 p-6 rounded-lg mb-6">
                            <button onClick=${handleSelectKey} class="bg-yellow-400 hover:bg-yellow-300 text-indigo-900 font-bold py-3 px-8 rounded-full transition transform hover:scale-105 shadow-lg">
                                Select API Key
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function InputForm({ onSubmit }) {
            const [formData, setFormData] = useState({
                name: '', animal: '', activity: '', place: '', color: '', toy: '',
                length: 'Short', complexity: 'Simple'
            });

            const handleChange = (e) => setFormData({ ...formData, [e.target.name]: e.target.value });

            const handleSubmit = (e) => {
                e.preventDefault();
                onSubmit(formData);
            };

            return html`
                <div class="min-h-screen flex items-center justify-center p-4">
                    <form onSubmit=${handleSubmit} class="bg-white rounded-2xl shadow-2xl p-8 max-w-2xl w-full animate-fade-in relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-yellow-400 via-pink-500 to-purple-600"></div>
                        <h2 class="text-3xl font-bold text-gray-800 mb-6 text-center">Tell me about yourself...</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-bold text-gray-600 mb-1">Child's Name</label>
                                <input required name="name" value=${formData.name} onInput=${handleChange} class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none" placeholder="e.g. Leo" />
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-gray-600 mb-1">Favorite Animal</label>
                                <input required name="animal" value=${formData.animal} onInput=${handleChange} class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none" placeholder="e.g. Dragon" />
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-gray-600 mb-1">Favorite Activity</label>
                                <input required name="activity" value=${formData.activity} onInput=${handleChange} class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none" placeholder="e.g. Jumping in puddles" />
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-gray-600 mb-1">Magical Place</label>
                                <input required name="place" value=${formData.place} onInput=${handleChange} class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none" placeholder="e.g. Cloud City" />
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-gray-600 mb-1">Preferred Color</label>
                                <input required name="color" value=${formData.color} onInput=${handleChange} class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none" placeholder="e.g. Sparkly Blue" />
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-gray-600 mb-1">Cherished Toy</label>
                                <input required name="toy" value=${formData.toy} onInput=${handleChange} class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none" placeholder="e.g. Mr. Bear" />
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-gray-600 mb-1">Story Length</label>
                                <select name="length" value=${formData.length} onChange=${handleChange} class="w-full p-3 border border-gray-300 rounded-lg">
                                    <option value="Short">Short (3-4 pages)</option>
                                    <option value="Medium">Medium (5-6 pages)</option>
                                    <option value="Long">Long (7-8 pages)</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-gray-600 mb-1">Complexity</label>
                                <select name="complexity" value=${formData.complexity} onChange=${handleChange} class="w-full p-3 border border-gray-300 rounded-lg">
                                    <option value="Simple">Simple (Ages 3-5)</option>
                                    <option value="Complex">Complex (Ages 6-8)</option>
                                </select>
                            </div>
                        </div>
                        <button type="submit" class="w-full mt-8 bg-gradient-to-r from-purple-600 to-pink-600 text-white font-bold py-4 rounded-xl text-xl hover:shadow-lg hover:scale-[1.02] transition transform">
                            Weave the Magic ✨
                        </button>
                    </form>
                </div>
            `;
        }

        function BookView({ story, pageIndex, onNext, onPrev, onRegenerateImage, onReadAloud, isReading, onContinue, isGenerating }) {
            // FIX: Guard Clause against crashes if story is empty or index is invalid
            if (!story || !story[pageIndex]) {
                return html`
                    <div class="min-h-screen flex items-center justify-center text-white">
                        <div class="text-center">
                            <div class="loading-spinner mx-auto mb-4"></div>
                            <p>Preparing the magic...</p>
                        </div>
                    </div>
                `;
            }

            const page = story[pageIndex];
            const isLastPage = pageIndex === story.length - 1;

            useEffect(() => {
                const textBox = document.getElementById('story-text-box');
                if (textBox) textBox.scrollTop = 0;
            }, [pageIndex]);

            return html`
                <div class="min-h-screen flex items-center justify-center p-2 md:p-8">
                    <div class="relative w-full max-w-6xl aspect-[16/10] bg-[#fdf6e3] rounded-r-2xl rounded-l-md shadow-2xl flex flex-col md:flex-row overflow-hidden border-8 border-[#5d4037]">
                        
                        <div class="hidden md:block absolute left-1/2 top-0 bottom-0 w-8 -ml-4 z-20 book-spine shadow-inner"></div>

                        <div class="w-full md:w-1/2 h-1/2 md:h-full bg-gray-100 relative border-r border-gray-300 p-4 flex items-center justify-center overflow-hidden">
                            ${page.imgUrl 
                                ? html`<img src=${page.imgUrl} class="w-full h-full object-cover rounded shadow-inner animate-fade-in" alt="Story Illustration" />`
                                : html`
                                    <div class="flex flex-col items-center text-gray-400">
                                        <div class="loading-spinner border-gray-400 border-t-purple-600 mb-2"></div>
                                        <p class="font-comic text-sm">Painting the magic...</p>
                                    </div>
                                `
                            }
                            
                            ${page.imgUrl && !isGenerating && html`
                                <button onClick=${() => onRegenerateImage(pageIndex)} class="absolute top-4 right-4 bg-white/80 p-2 rounded-full shadow hover:bg-white text-gray-700" title="Redraw this picture">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38"/></svg>
                                </button>
                            `}
                        </div>

                        <div class="w-full md:w-1/2 h-1/2 md:h-full relative bg-[#fdf6e3] page-shadow p-8 md:p-12 flex flex-col">
                            <div class="flex-grow overflow-y-auto custom-scroll pr-2 mb-4" id="story-text-box">
                                <p class="book-text text-xl md:text-2xl leading-loose text-gray-800 transition-colors duration-300 ${isReading ? 'text-purple-900 drop-shadow-sm font-medium' : ''}">
                                    ${page.pageText}
                                </p>
                            </div>

                            <div class="mt-auto flex justify-between items-center pt-4 border-t border-[#d4c4a8]">
                                <button disabled=${pageIndex === 0} onClick=${onPrev} class="text-[#5d4037] hover:text-purple-700 font-bold disabled:opacity-30 flex items-center gap-2">
                                    ← Prev
                                </button>
                                
                                <span class="text-sm text-[#8d6e63]">Page ${pageIndex + 1} of ${story.length}</span>

                                <div class="flex gap-4">
                                    <button onClick=${() => onReadAloud(pageIndex)} class="p-3 rounded-full ${isReading ? 'bg-pink-500 text-white animate-pulse' : 'bg-[#eaddcf] text-[#5d4037] hover:bg-pink-100'} shadow transition">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                                    </button>

                                    ${isLastPage && !isGenerating 
                                        ? html`<button onClick=${onContinue} class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-lg font-bold shadow transition">Continue Adventure</button>`
                                        : html`<button disabled=${isLastPage} onClick=${onNext} class="text-[#5d4037] hover:text-purple-700 font-bold disabled:opacity-30 flex items-center gap-2">Next →</button>`
                                    }
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // --- Main App Logic ---

        function App() {
            const [view, setView] = useState('auth');
            const [formData, setFormData] = useState(null);
            const [story, setStory] = useState([]);
            const [pageIndex, setPageIndex] = useState(0);
            const [loadingMsg, setLoadingMsg] = useState('');
            const [isReading, setIsReading] = useState(false);
            
            const audioCtxRef = useRef(null);
            const sourceNodeRef = useRef(null);

            const getClient = () => {
                const apiKey = window.MANUAL_API_KEY || process.env.API_KEY; 
                return new GoogleGenAI({ apiKey, transport: 'rest' });
            };

            const handleAuth = () => setView('input');

            const generateStory = async (inputs, isContinuation = false) => {
                setLoadingMsg(isContinuation ? "Dreaming up the next chapter..." : "Writing your magical book...");
                
                try {
                    const client = getClient();
                    
                    let prompt = "";
                    if (isContinuation) {
                        const previousContext = story.map(p => p.pageText).join(" ");
                        prompt = `
                            You are a children's story author. Continue the following story about ${inputs.name} (favorite animal: ${inputs.animal}, toy: ${inputs.toy}).
                            Previous story: "${previousContext}".
                            Write 2-3 new pages to continue the adventure.
                            Maintain the tone. Output valid JSON only: { "pages": [{ "pageText": "...", "illustrationPrompt": "..." }] }.
                            Escape double quotes in strings.
                        `;
                    } else {
                        prompt = `
                            Create a magical children's story.
                            Name: ${inputs.name}.
                            Favorite Animal: ${inputs.animal}.
                            Favorite Activity: ${inputs.activity}.
                            Place: ${inputs.place}.
                            Color: ${inputs.color}.
                            Toy: ${inputs.toy}.
                            Length: ${inputs.length} (Short=3 pages, Medium=5, Long=7).
                            Complexity: ${inputs.complexity}.
                            
                            Structure: Beginning, Middle, End.
                            Output strictly valid JSON. 
                            Format: { "pages": [{ "pageText": "2-3 sentences max", "illustrationPrompt": "Whimsical simple colorful description for image generator" }] }.
                            Ensure JSON strings escape double quotes properly.
                        `;
                    }

                    const response = await client.models.generateContent({
                        model: MODEL_STORY,
                        contents: [{ role: 'user', parts: [{ text: prompt }] }],
                        config: { responseMimeType: 'application/json' }
                    });

                    const text = response.response.candidates[0].content.parts[0].text;
                    const json = JSON.parse(cleanJson(text));
                    
                    const newPages = json.pages.map(p => ({
                        ...p,
                        imgUrl: null,
                        audioBuffer: null
                    }));

                    if (isContinuation) {
                        const startIndex = story.length;
                        setStory(prev => [...prev, ...newPages]);
                        setPageIndex(startIndex); 
                        newPages.forEach((_, idx) => triggerImageGeneration(startIndex + idx, newPages[idx].illustrationPrompt));
                    } else {
                        setStory(newPages);
                        setView('book');
                        newPages.forEach((_, idx) => triggerImageGeneration(idx, newPages[idx].illustrationPrompt));
                    }

                } catch (error) {
                    console.error("Story Generation Error:", error);
                    let alertMsg = "The magic wand fizzled. Please try again.";
                    
                    // Specific handling for 429
                    if (error.message && error.message.includes('429')) {
                        alertMsg = "The storyteller is a bit tired (Quota Exceeded). Please wait a minute and try again.";
                    }
                    
                    alert(alertMsg);
                    // Do not switch view if failing on initial generation
                    if (!isContinuation) setView('input');
                } finally {
                    setLoadingMsg('');
                }
            };

            const triggerImageGeneration = async (idx, prompt) => {
                try {
                    const client = getClient();
                    const response = await client.models.generateContent({
                        model: MODEL_IMAGE,
                        contents: [{ role: 'user', parts: [{ text: `Whimsical, watercolor style, children's book illustration. ${prompt}` }] }]
                    });
                    
                    const imgPart = response.response.candidates[0].content.parts[0];
                    let base64 = "";
                    if (imgPart.inlineData) base64 = imgPart.inlineData.data;
                    else return;

                    const imgUrl = `data:image/png;base64,${base64}`;

                    setStory(prev => {
                        const newStory = [...prev];
                        if(newStory[idx]) newStory[idx].imgUrl = imgUrl;
                        return newStory;
                    });

                } catch (e) {
                    console.error("Image gen failed for page " + idx, e);
                }
            };

            const regenerateImage = (idx) => {
                const newPrompt = prompt("Modify image description:", story[idx].illustrationPrompt);
                if (newPrompt) {
                    setStory(prev => {
                        const copy = [...prev];
                        copy[idx].imgUrl = null; 
                        copy[idx].illustrationPrompt = newPrompt;
                        return copy;
                    });
                    triggerImageGeneration(idx, newPrompt);
                }
            };

            const stopAudio = () => {
                if (sourceNodeRef.current) {
                    sourceNodeRef.current.stop();
                    sourceNodeRef.current = null;
                }
                setIsReading(false);
            };

            const readPage = async (idx) => {
                stopAudio();
                if (!story[idx]) return;

                setIsReading(true);

                try {
                    const client = getClient();
                    const response = await client.models.generateContent({
                        model: MODEL_TTS,
                        contents: [{ role: 'user', parts: [{ text: story[idx].pageText }] }],
                        config: { responseModalities: ['AUDIO'], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: 'Kore' } } } }
                    });

                    const audioPart = response.response.candidates[0].content.parts[0];
                    if (!audioPart.inlineData) throw new Error("No audio data");

                    const { buffer, ctx } = decodeAudioData(audioPart.inlineData.data);
                    
                    if (ctx.state === 'suspended') await ctx.resume();
                    
                    audioCtxRef.current = ctx;

                    const source = ctx.createBufferSource();
                    source.buffer = buffer;
                    source.connect(ctx.destination);
                    
                    source.onended = () => {
                        setIsReading(false);
                        if (idx < story.length - 1) {
                            setPageIndex(idx + 1);
                            setTimeout(() => readPage(idx + 1), 500); 
                        }
                    };

                    sourceNodeRef.current = source;
                    source.start(0);

                } catch (e) {
                    console.error("TTS Error", e);
                    setIsReading(false);
                    alert("Could not read aloud at this moment.");
                }
            };

            const handleNext = () => {
                stopAudio();
                setPageIndex(p => Math.min(story.length - 1, p + 1));
            };
            
            const handlePrev = () => {
                stopAudio();
                setPageIndex(p => Math.max(0, p - 1));
            };

            if (view === 'auth') return html`<${AuthScreen} onAuth=${handleAuth} />`;
            
            if (view === 'input') {
                return html`
                    ${loadingMsg && html`<${LoadingOverlay} message=${loadingMsg} />`}
                    <${InputForm} onSubmit=${(data) => { setFormData(data); generateStory(data); }} />
                `;
            }

            if (view === 'book') {
                return html`
                    ${loadingMsg && html`<${LoadingOverlay} message=${loadingMsg} />`}
                    <${BookView} 
                        story=${story} 
                        pageIndex=${pageIndex} 
                        onNext=${handleNext} 
                        onPrev=${handlePrev}
                        onRegenerateImage=${regenerateImage}
                        onReadAloud=${readPage}
                        isReading=${isReading}
                        onContinue=${() => generateStory(formData, true)}
                        isGenerating=${!!loadingMsg}
                    />
                `;
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(html`<${App} />`);
    </script>
</body>
</html>
